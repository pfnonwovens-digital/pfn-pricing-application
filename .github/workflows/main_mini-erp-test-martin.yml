# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - mini-erp-test-Martin

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - '.gitignore'
  workflow_dispatch:

concurrency:
  group: azure-deploy-mini-erp-test-martin
  cancel-in-progress: true

env:
  AZURE_WEBAPP_NAME: mini-erp-test-Martin
  NODE_VERSION: '18.x'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Show build context
        run: |
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          node --version
          npm --version

      - name: Validate required project files
        run: |
          test -f package.json
          test -f server.js
          test -d src
          node --check server.js

      - name: Prepare deployment package
        run: |
          mkdir -p deploy
          rsync -a ./ deploy/ \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'deploy' \
            --exclude 'node_modules' \
            --exclude '*.log' \
            --exclude 'server-output.txt' \
            --exclude 'azure-deployment-info.txt'
          test -f deploy/package.json
          test -f deploy/server.js
          if [ -f deploy/web.config ]; then
            echo "web.config found"
          else
            echo "web.config not found (ok for Linux plans, required for Windows IISNode)"
          fi
      
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: deploy
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_FEF459AB841E414B9C5BD8DE75103C69 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_7129AC635ED5412F9EA42E0D1E99FD98 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_EAE0B7239BD64F008C2E3F88CB81DB96 }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: 'Production'
          package: deploy

      - name: Health check
        run: |
          for i in {1..10}; do
            code=$(curl -s -o /tmp/health.json -w "%{http_code}" "https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/api/health" || true)
            if [ "$code" = "200" ]; then
              echo "Health check passed"
              cat /tmp/health.json
              exit 0
            fi
            echo "Health check attempt $i failed (HTTP $code), retrying in 15s..."
            sleep 15
          done
          echo "Health check failed after deployment"
          exit 1
          