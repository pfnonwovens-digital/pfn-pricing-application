<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PFN Material Costing/Pricing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-a: #f5f9ff;
      --bg-b: #d9ebff;
      --ink-900: #0e2a47;
      --ink-600: #32557a;
      --tile-shadow: 0 10px 22px rgba(26, 52, 87, 0.18);
      --tile-radius: 14px;
      --white: #ffffff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Poppins", "Segoe UI", sans-serif;
      color: var(--ink-900);
      min-height: 100vh;
      background:
        radial-gradient(circle at 85% 12%, rgba(255, 255, 255, 0.76) 0%, rgba(255, 255, 255, 0) 36%),
        linear-gradient(135deg, var(--bg-a) 0%, var(--bg-b) 100%);
      padding: 22px;
    }

    .shell {
      max-width: 1260px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(3px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 16px 46px rgba(16, 42, 71, 0.16);
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 20px;
      border-bottom: 2px solid #dbeaf9;
      padding-bottom: 18px;
    }

    .branding {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .branding img {
      width: 62px;
      height: 62px;
      object-fit: contain;
    }

    .title-wrap h1 {
      margin: 0;
      font-size: 1.65rem;
      letter-spacing: 0.2px;
    }

    .title-wrap p {
      margin: 2px 0 0;
      color: var(--ink-600);
      font-size: 0.92rem;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .action-btn {
      border: 0;
      border-radius: 10px;
      padding: 9px 12px;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
      font-family: inherit;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .action-btn:hover { transform: translateY(-1px); }

    .btn-password { background: #2667c9; }
    .btn-admin { background: #d97706; }
    .btn-logout { background: #cf3f4e; }

    .landing-intro {
      margin: 2px 0 16px;
      color: var(--ink-600);
      font-size: 0.97rem;
    }

    .tile-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(210px, 1fr));
      gap: 14px;
    }

    .tile {
      border: 0;
      border-radius: var(--tile-radius);
      min-height: 95px;
      color: #fff;
      text-align: left;
      cursor: pointer;
      padding: 14px;
      font-family: inherit;
      box-shadow: var(--tile-shadow);
      transition: transform 0.16s ease, filter 0.16s ease;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }

    .tile::after {
      content: "";
      position: absolute;
      right: -10px;
      top: -10px;
      width: 62px;
      height: 62px;
      background: rgba(255, 255, 255, 0.18);
      border-radius: 50%;
    }

    .tile:hover {
      transform: translateY(-3px);
      filter: brightness(1.03);
    }

    .tile-icon {
      font-size: 1.2rem;
      opacity: 0.95;
      position: relative;
      z-index: 1;
    }

    .tile-label {
      font-size: 1.02rem;
      font-weight: 600;
      line-height: 1.2;
      position: relative;
      z-index: 1;
    }

    .empty-note {
      color: var(--ink-600);
      padding: 18px;
      border-radius: 12px;
      background: #eef5ff;
      border: 1px solid #d9e8fb;
      font-size: 0.95rem;
    }

    .t-recipe { background: linear-gradient(135deg, #ce3d7f, #e0619e); }
    .t-edit { background: linear-gradient(135deg, #7a3fb5, #9c66d0); }
    .t-bom { background: linear-gradient(135deg, #345bd8, #2f86db); }
    .t-approval { background: linear-gradient(135deg, #0f7a6b, #24a38f); }
    .t-rm { background: linear-gradient(135deg, #cf5c08, #e98a1f); }
    .t-polymer { background: linear-gradient(135deg, #0c8a40, #33a454); }
    .t-fx { background: linear-gradient(135deg, #5f55ca, #7a67dd); }
    .t-line { background: linear-gradient(135deg, #0a7488, #1b9fb2); }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(17, 31, 48, 0.46);
      z-index: 1000;
    }

    .modal-content {
      width: min(440px, 92vw);
      background: #fff;
      margin: 12vh auto;
      border-radius: 12px;
      padding: 18px;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.22);
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .modal-head h2 {
      margin: 0;
      font-size: 1.1rem;
    }

    .close-btn {
      border: 0;
      background: transparent;
      font-size: 1.6rem;
      color: #7b8ca0;
      cursor: pointer;
      line-height: 1;
    }

    .field { margin-bottom: 12px; }

    .field label {
      display: block;
      margin-bottom: 5px;
      font-size: 0.9rem;
      color: #405972;
      font-weight: 600;
    }

    .field input {
      width: 100%;
      border: 1px solid #cbd8e6;
      border-radius: 8px;
      padding: 10px;
      font-family: inherit;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 8px;
    }

    .btn-flat,
    .btn-green {
      border: 0;
      border-radius: 8px;
      padding: 9px 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-flat { background: #eef2f6; color: #2f4a66; }
    .btn-green { background: #2e9748; color: #fff; }

    @media (max-width: 980px) {
      .tile-grid { grid-template-columns: repeat(2, minmax(190px, 1fr)); }
      .header { flex-direction: column; align-items: stretch; }
      .top-actions { justify-content: flex-start; }
    }

    @media (max-width: 620px) {
      body { padding: 12px; }
      .shell { padding: 16px; }
      .tile-grid { grid-template-columns: 1fr; }
      .branding img { width: 52px; height: 52px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="header">
      <div class="branding">
        <img src="/data/PFN_logo.png" alt="PFN" />
        <div class="title-wrap">
          <h1>PFN Material Costing/Pricing</h1>
          <p>Tool for recipe management and material pricing</p>
        </div>
      </div>

      <div class="top-actions">
        <button id="changePasswordBtn" class="action-btn btn-password" style="display:none;" onclick="openChangePasswordModal()">Change Password</button>
        <button id="adminBtn" class="action-btn btn-admin" style="display:none;" onclick="window.location.href='/admin-access.html'">Admin</button>
        <button class="action-btn btn-logout" onclick="auth.logout()">Logout</button>
      </div>
    </div>

    <p class="landing-intro">Choose the module you want to open.</p>

    <div id="tileGrid" class="tile-grid"></div>
    <div id="emptyNote" class="empty-note" style="display:none;">No page is available for your current permissions. Contact an administrator.</div>
  </div>

  <div id="changePasswordModal" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-head">
        <h2>Change Password</h2>
        <button class="close-btn" onclick="closeChangePasswordModal()">&times;</button>
      </div>

      <div class="field">
        <label for="currentPassword">Current Password</label>
        <input type="password" id="currentPassword" />
      </div>

      <div class="field">
        <label for="newPassword">New Password</label>
        <input type="password" id="newPassword" />
      </div>

      <div class="field">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" />
      </div>

      <div class="modal-actions">
        <button class="btn-flat" onclick="closeChangePasswordModal()">Cancel</button>
        <button class="btn-green" onclick="confirmChangePassword()">Change Password</button>
      </div>
    </div>
  </div>

  <script src="/auth.js"></script>
  <script>
    const TILES = [
      { key: 'bom-recipe-browser', label: 'Recipe Browser', path: '/bom-recipe-browser', icon: 'i', cls: 't-recipe' },
      { key: 'recipe-edit-clone', label: 'Recipe Edit Clone', path: '/recipe-edit-clone', icon: 'E', cls: 't-edit' },
      { key: 'bom-calculator', label: 'BOM Calculator', path: '/bom-calculator', icon: '∑', cls: 't-bom' },
      { key: 'recipe-approval', label: 'Recipe Approval', path: '/recipe-approval', icon: '✓', cls: 't-approval' },
      { key: 'rm-prices', label: 'Raw Material Prices', path: '/rm-prices', icon: '$', cls: 't-rm' },
      { key: 'polymer-indexes', label: 'Polymer Indexes', path: '/polymer-indexes', icon: '◌', cls: 't-polymer' },
      { key: 'fx-rates', label: 'FX Rates', path: '/fx-rates', icon: '↔', cls: 't-fx' },
      { key: 'line-rates', label: 'Line Rates', path: '/line-rates', icon: '#', cls: 't-line' }
    ];

    function openChangePasswordModal() {
      const modal = document.getElementById('changePasswordModal');
      if (!modal) return;
      modal.style.display = 'block';
      document.getElementById('currentPassword').value = '';
      document.getElementById('newPassword').value = '';
      document.getElementById('confirmPassword').value = '';
      document.getElementById('currentPassword').focus();
    }

    function closeChangePasswordModal() {
      const modal = document.getElementById('changePasswordModal');
      if (modal) modal.style.display = 'none';
    }

    async function confirmChangePassword() {
      const currentPassword = document.getElementById('currentPassword').value;
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const token = localStorage.getItem('authToken');

      if (!currentPassword || !newPassword || !confirmPassword) {
        alert('All fields are required');
        return;
      }
      if (newPassword !== confirmPassword) {
        alert('New passwords do not match');
        return;
      }
      if (newPassword.length < 6) {
        alert('New password must be at least 6 characters');
        return;
      }
      if (currentPassword === newPassword) {
        alert('New password must be different from current password');
        return;
      }

      try {
        const response = await fetch('/api/auth/change-password', {
          method: 'POST',
          headers: {
            Authorization: `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ currentPassword, newPassword })
        });

        const data = await response.json();
        if (response.ok) {
          alert('Password changed successfully');
          closeChangePasswordModal();
        } else {
          alert('Error: ' + (data.error || 'Failed to change password'));
        }
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    function renderTiles(allowedPageMap) {
      const tileGrid = document.getElementById('tileGrid');
      const emptyNote = document.getElementById('emptyNote');

      const visible = TILES.filter((tile) => {
        const permission = allowedPageMap[tile.key];
        return !!(permission && permission.read);
      });

      if (!visible.length) {
        tileGrid.innerHTML = '';
        emptyNote.style.display = 'block';
        return;
      }

      emptyNote.style.display = 'none';
      tileGrid.innerHTML = visible.map((tile) => (
        `<button class="tile ${tile.cls}" onclick="window.location.href='${tile.path}'">` +
          `<div class="tile-icon">${tile.icon}</div>` +
          `<div class="tile-label">${tile.label}</div>` +
        `</button>`
      )).join('');
    }

    async function initialize() {
      const token = localStorage.getItem('authToken');
      if (!token) {
        window.location.href = '/login.html';
        return;
      }

      let pagePermissions = {};

      try {
        const pagePermResponse = await fetch('/api/auth/me/access-permissions', {
          headers: { Authorization: `Bearer ${token}` }
        });
        if (pagePermResponse.ok) {
          const pageData = await pagePermResponse.json();
          pagePermissions = pageData.pages || {};
        }
      } catch (_) {}

      await auth.configureHeaderButtons();

      renderTiles(pagePermissions);
    }

    window.onclick = function(event) {
      const modal = document.getElementById('changePasswordModal');
      if (modal && event.target === modal) {
        closeChangePasswordModal();
      }
    };

    document.addEventListener('DOMContentLoaded', initialize);
  </script>
</body>
</html>
