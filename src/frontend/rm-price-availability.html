<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Raw Material Availability Matrix</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .page-wrap { max-width: 1400px; margin: 0 auto; padding: 20px; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; }
    .filters { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; background: #f5f7fb; border: 1px solid #dbe3f0; border-radius: 8px; padding: 10px 12px; }
    .filters input, .filters select { padding: 6px 8px; border: 1px solid #cfd8e3; border-radius: 6px; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn { border: none; border-radius: 6px; padding: 8px 12px; font-weight: 600; cursor: pointer; }
    .btn-primary { background: #1f5fbf; color: #fff; }
    .btn-secondary { background: #e9eef8; color: #1d355d; }
    .btn-success { background: #2e7d32; color: #fff; }
    .btn-danger { background: #b71c1c; color: #fff; }
    .status { margin: 10px 0 14px; min-height: 20px; font-weight: 600; }
    .status.error { color: #b71c1c; }
    .status.ok { color: #1b5e20; }
    .note { margin-bottom: 12px; color: #4a5568; }
    .table-wrap { overflow: auto; border: 1px solid #dbe3f0; border-radius: 8px; background: #fff; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border-bottom: 1px solid #edf2f7; padding: 10px; text-align: left; }
    th {
      position: sticky;
      top: 0;
      background: #dce8f8;
      color: #102a43;
      z-index: 1;
      font-weight: 700;
    }
    td.matrix-cell, th.matrix-cell { text-align: center; width: 100px; }
    tr.changed { background: #fff8e1; }
    .category-pill { display: inline-block; padding: 2px 8px; border-radius: 999px; background: #eef3fb; color: #1f3b63; font-size: 0.85em; }
    .readonly-note { color: #7a7a7a; font-style: italic; }
  </style>
</head>
<body>
  <div class="container">
    <header class="app-header">
      <div class="app-branding">
        <img src="/data/PFN_logo.png" alt="PFN" class="company-logo" />
        <div class="app-title-wrap">
          <h1>Raw Material Availability Matrix</h1>
          <p>Material availability by plant (CZ, EG, ZA)</p>
        </div>
      </div>
      <div class="app-top-actions">
        <button class="action-btn btn-nav" onclick="window.location.href='/rm-prices'">Back to Price Management</button>
        <button class="action-btn btn-nav" onclick="window.location.href='/dashboard'">Back to Dashboard</button>
        <button id="changePasswordBtn" class="action-btn btn-password" style="display:none;">Change Password</button>
        <button id="adminBtn" class="action-btn btn-admin" style="display:none;">Admin</button>
        <button class="action-btn btn-logout" onclick="auth.logout()">Logout</button>
      </div>
    </header>

    <div class="page-wrap">
      <div class="top-bar">
        <div class="filters">
          <label for="searchInput">Search</label>
          <input id="searchInput" type="text" placeholder="Material name" />

          <label for="categoryFilter">Category</label>
          <select id="categoryFilter">
            <option value="">All categories</option>
            <option value="list_sb">SB polymer</option>
            <option value="list_mb">MB polymer</option>
            <option value="list_pigment">Pigment</option>
            <option value="list_additive">Additive</option>
            <option value="list_surfactant">Surfactant</option>
          </select>

          <button class="btn btn-secondary" onclick="renderRows()">Apply Filter</button>
        </div>

        <div class="actions">
          <button id="selectAllBtn" class="btn btn-secondary" onclick="setAllVisible(true)">Select Visible</button>
          <button id="clearAllBtn" class="btn btn-secondary" onclick="setAllVisible(false)">Clear Visible</button>
          <button id="saveBtn" class="btn btn-success" onclick="saveChanges()">Save Availability</button>
        </div>
      </div>

      <div class="note">
        If a material is unchecked for a plant, it is treated as unavailable there: it will not require a price and will not be flagged as missing in the monthly price sheet.
      </div>

      <div id="status" class="status"></div>
      <div id="summary" class="note"></div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Category</th>
              <th>Material</th>
              <th class="matrix-cell">CZ</th>
              <th class="matrix-cell">EG</th>
              <th class="matrix-cell">ZA</th>
              <th id="deleteHead" class="matrix-cell">Delete</th>
            </tr>
          </thead>
          <tbody id="matrixBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="/auth.js"></script>
  <script>
    let canManage = false;
    let matrixRows = [];
    let filteredRows = [];

    function setStatus(message, type = '') {
      const el = document.getElementById('status');
      el.textContent = message || '';
      el.className = `status ${type}`.trim();
    }

    function categoryLabel(listKey) {
      const map = {
        list_sb: 'SB polymer',
        list_mb: 'MB polymer',
        list_pigment: 'Pigment',
        list_additive: 'Additive',
        list_surfactant: 'Surfactant'
      };
      return map[listKey] || listKey;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = String(text ?? '');
      return div.innerHTML;
    }

    function keyFor(listKey, materialName) {
      return `${listKey}::${materialName}`;
    }

    async function detectManagePermission() {
      try {
        const token = auth.getToken();
        const [meResp, groupsResp, accessResp] = await Promise.all([
          fetch('/api/auth/me', { headers: { Authorization: `Bearer ${token}` } }),
          fetch('/api/auth/me/groups', { headers: { Authorization: `Bearer ${token}` } }),
          fetch('/api/auth/me/access-permissions', { headers: { Authorization: `Bearer ${token}` } })
        ]);

        const me = meResp.ok ? await meResp.json() : null;
        const groups = groupsResp.ok ? await groupsResp.json() : [];
        const access = accessResp.ok ? await accessResp.json() : {};

        if (me && me.role === 'admin') {
          canManage = true;
        } else {
          const legacyManage = (groups || []).some(g => Array.isArray(g.permissions) && g.permissions.includes('rm_prices:manage'));
          const pageModify = !!(access && access.pages && access.pages['rm-prices'] && access.pages['rm-prices'].modify);
          canManage = legacyManage || pageModify;
        }
      } catch (_) {
        canManage = false;
      }

      document.getElementById('saveBtn').disabled = !canManage;
      document.getElementById('selectAllBtn').disabled = !canManage;
      document.getElementById('clearAllBtn').disabled = !canManage;
      document.getElementById('deleteHead').style.display = canManage ? '' : 'none';
    }

    async function loadMatrix() {
      setStatus('Loading availability matrix...');
      try {
        const response = await fetch('/api/rm-prices/plant-materials', {
          headers: { Authorization: `Bearer ${auth.getToken()}` }
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Failed to load plant materials');

        const byMaterial = new Map();
        (data.rows || []).forEach((row) => {
          const key = keyFor(row.material_list_key, row.material_name);
          if (!byMaterial.has(key)) {
            byMaterial.set(key, {
              material_list_key: row.material_list_key,
              material_name: row.material_name,
              CZ: false,
              EG: false,
              ZA: false,
              original: { CZ: false, EG: false, ZA: false }
            });
          }

          const entry = byMaterial.get(key);
          const isActive = !!row.active;
          entry[row.plant] = isActive;
          entry.original[row.plant] = isActive;
        });

        matrixRows = Array.from(byMaterial.values()).sort((a, b) => {
          if (a.material_list_key !== b.material_list_key) {
            return a.material_list_key.localeCompare(b.material_list_key);
          }
          return a.material_name.localeCompare(b.material_name, undefined, { sensitivity: 'base', numeric: true });
        });

        renderRows();
        setStatus('Availability matrix loaded.', 'ok');
      } catch (err) {
        setStatus(`Error: ${err.message}`, 'error');
      }
    }

    function getChangedCount() {
      return matrixRows.filter((row) => ['CZ', 'EG', 'ZA'].some((plant) => row[plant] !== row.original[plant])).length;
    }

    function getFilters() {
      return {
        search: String(document.getElementById('searchInput').value || '').trim().toLowerCase(),
        category: document.getElementById('categoryFilter').value
      };
    }

    function renderRows() {
      const tbody = document.getElementById('matrixBody');
      tbody.innerHTML = '';
      const filters = getFilters();

      filteredRows = matrixRows.filter((row) => {
        if (filters.category && row.material_list_key !== filters.category) {
          return false;
        }
        if (filters.search && !row.material_name.toLowerCase().includes(filters.search)) {
          return false;
        }
        return true;
      });

      filteredRows.forEach((row) => {
        const tr = document.createElement('tr');
        const changed = ['CZ', 'EG', 'ZA'].some((plant) => row[plant] !== row.original[plant]);
        if (changed) {
          tr.classList.add('changed');
        }

        tr.innerHTML = `
          <td><span class="category-pill">${escapeHtml(categoryLabel(row.material_list_key))}</span></td>
          <td>${escapeHtml(row.material_name)}</td>
          ${renderCheckboxCell(row, 'CZ')}
          ${renderCheckboxCell(row, 'EG')}
          ${renderCheckboxCell(row, 'ZA')}
          ${renderDeleteCell(row)}
        `;

        tbody.appendChild(tr);
      });

      document.getElementById('summary').textContent = `Visible materials: ${filteredRows.length} | Changed rows: ${getChangedCount()}${canManage ? '' : ' | Read-only mode'}`;
    }

    function renderCheckboxCell(row, plant) {
      const checked = row[plant] ? 'checked' : '';
      const disabled = canManage ? '' : 'disabled';
      return `<td class="matrix-cell"><input type="checkbox" ${checked} ${disabled} onchange="togglePlant('${row.material_list_key}','${escapeHtmlForJs(row.material_name)}','${plant}', this.checked)" /></td>`;
    }

    function renderDeleteCell(row) {
      if (!canManage) return '';
      return `<td class="matrix-cell"><button class="btn btn-danger" onclick="deleteMaterial('${row.material_list_key}','${escapeHtmlForJs(row.material_name)}')">Delete</button></td>`;
    }

    function escapeHtmlForJs(text) {
      return String(text).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    }

    function formatDeletionDetails(details) {
      const labels = {
        bom_dropdown_list_items: 'BOM dropdown items',
        rm_prices: 'RM prices',
        rm_polymer_formulas: 'RM polymer formulas',
        rm_plant_materials: 'RM plant materials',
        bom_record_materials: 'BOM record materials',
        bom_records_main_raw_mat: 'BOM records main raw material'
      };

      return Object.entries(details || {})
        .filter(([, value]) => Number(value || 0) > 0)
        .map(([key, value]) => `${labels[key] || key}: ${value}`)
        .join(' | ');
    }

    function togglePlant(listKey, materialName, plant, checked) {
      const row = matrixRows.find((item) => item.material_list_key === listKey && item.material_name === materialName);
      if (!row) return;
      row[plant] = checked;
      renderRows();
    }

    function setAllVisible(active) {
      if (!canManage) return;
      filteredRows.forEach((row) => {
        row.CZ = active;
        row.EG = active;
        row.ZA = active;
      });
      renderRows();
    }

    async function deleteMaterial(listKey, materialName) {
      if (!canManage) {
        setStatus('You do not have permission to delete materials.', 'error');
        return;
      }

      const confirmed = window.confirm(
        `Delete material "${materialName}" from all database tables? This action cannot be undone.`
      );
      if (!confirmed) return;

      setStatus(`Deleting material ${materialName}...`);
      try {
        const response = await fetch('/api/rm-prices/materials', {
          method: 'DELETE',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${auth.getToken()}`
          },
          body: JSON.stringify({
            material_list_key: listKey,
            material_name: materialName
          })
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Failed to delete material');

        matrixRows = matrixRows.filter((row) => !(row.material_list_key === listKey && row.material_name === materialName));
        filteredRows = filteredRows.filter((row) => !(row.material_list_key === listKey && row.material_name === materialName));
        renderRows();

        const deleted = data.deleted || {};
        const affected = Object.values(deleted).reduce((sum, value) => sum + Number(value || 0), 0);
        const detail = formatDeletionDetails(deleted);
        setStatus(`Deleted ${materialName}. Affected records: ${affected}.${detail ? ` ${detail}` : ''}`, 'ok');
      } catch (err) {
        setStatus(`Error: ${err.message}`, 'error');
      }
    }

    async function saveChanges() {
      if (!canManage) {
        setStatus('You do not have permission to update availability.', 'error');
        return;
      }

      const assignments = [];
      matrixRows.forEach((row) => {
        ['CZ', 'EG', 'ZA'].forEach((plant) => {
          if (row[plant] !== row.original[plant]) {
            assignments.push({
              material_list_key: row.material_list_key,
              material_name: row.material_name,
              plant,
              active: row[plant]
            });
          }
        });
      });

      if (assignments.length === 0) {
        setStatus('No changes to save.', 'ok');
        return;
      }

      setStatus('Saving availability changes...');
      try {
        const response = await fetch('/api/rm-prices/plant-materials', {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${auth.getToken()}`
          },
          body: JSON.stringify({ assignments })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Failed to save changes');

        matrixRows.forEach((row) => {
          row.original = { CZ: row.CZ, EG: row.EG, ZA: row.ZA };
        });

        renderRows();
        setStatus(`Saved ${assignments.length} availability updates.`, 'ok');
      } catch (err) {
        setStatus(`Error: ${err.message}`, 'error');
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      if (!auth.isAuthenticated()) {
        window.location.href = '/login.html';
        return;
      }

      await auth.configureHeaderButtons();
      await detectManagePermission();
      await loadMatrix();
      document.getElementById('searchInput').addEventListener('input', renderRows);
      document.getElementById('categoryFilter').addEventListener('change', renderRows);
    });
  </script>
</body>
</html>
