<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Raw Material Prices</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    .page-wrap { max-width: 1300px; margin: 0 auto; padding: 20px; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .filters { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; background: #f5f7fb; border: 1px solid #dbe3f0; border-radius: 8px; padding: 10px 12px; }
    .filters label { font-weight: 600; }
    .filters select, .filters input { padding: 6px 8px; border: 1px solid #cfd8e3; border-radius: 6px; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn { border: none; border-radius: 6px; padding: 8px 12px; font-weight: 600; cursor: pointer; }
    .btn-primary { background: #1f5fbf; color: #fff; }
    .btn-secondary { background: #e9eef8; color: #1d355d; }
    .btn-success { background: #2e7d32; color: #fff; }
    .btn-danger { background: #b71c1c; color: #fff; }
    .status { margin: 10px 0 14px; min-height: 20px; font-weight: 600; }
    .status.error { color: #b71c1c; }
    .status.ok { color: #1b5e20; }

    .table-wrap { overflow: auto; border: 1px solid #dbe3f0; border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; background: #fff; }
    th, td { border-bottom: 1px solid #ecf0f6; padding: 10px; text-align: left; }
    th { position: sticky; top: 0; background: #dce8f8; color: #102a43; z-index: 1; font-weight: 700; }

    tr.missing { background: #ffebee; }
    tr.fallback { background: #fff8e1; }

    .inline-edit { display: flex; gap: 6px; align-items: center; }
    .inline-edit input { width: 90px; padding: 4px 6px; border: 1px solid #cfd8e3; border-radius: 4px; }
    .inline-edit button { padding: 5px 8px; }

    .admin-tools { margin-top: 18px; border: 1px solid #dbe3f0; border-radius: 8px; padding: 12px; background: #fafcff; }
    .admin-tools h3 { margin-top: 0; }
    .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 10px; }
    .admin-grid input, .admin-grid select { width: 100%; padding: 6px 8px; border: 1px solid #cfd8e3; border-radius: 6px; }
    .small-note { font-size: 0.9em; color: #555; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <header class="app-header">
      <div class="app-branding">
        <img src="/data/PFN_logo.png" alt="PFN" class="company-logo" />
        <div class="app-title-wrap">
          <h1>Raw Material Price Management</h1>
          <p>Monthly pricing by plant (CZ, EG, ZA)</p>
        </div>
      </div>
      <div class="app-top-actions">
        <button class="action-btn btn-nav" onclick="window.location.href='/dashboard'">Back to Dashboard</button>
        <button id="changePasswordBtn" class="action-btn btn-password" style="display:none;">Change Password</button>
        <button id="adminBtn" class="action-btn btn-admin" style="display:none;">Admin</button>
        <button class="action-btn btn-logout" onclick="auth.logout()">Logout</button>
      </div>
    </header>

    <div class="page-wrap">
      <div class="top-bar">
        <div class="filters">
          <label for="yearInput">Year</label>
          <input id="yearInput" type="number" min="2000" max="2100" />

          <label for="monthInput">Month</label>
          <input id="monthInput" type="number" min="1" max="12" />

          <label for="plantSelect">Plant</label>
          <select id="plantSelect">
            <option value="CZ">CZ</option>
            <option value="EG">EG</option>
            <option value="ZA">ZA</option>
          </select>

          <label for="categoryFilter">Category</label>
          <select id="categoryFilter">
            <option value="">All</option>
            <option value="list_sb">SB polymer</option>
            <option value="list_mb">MB polymer</option>
            <option value="list_pigment">Pigment</option>
            <option value="list_additive">Additive</option>
            <option value="list_surfactant">Surfactant</option>
          </select>

          <label for="statusFilter">Status</label>
          <select id="statusFilter">
            <option value="">All</option>
            <option value="priced">Priced</option>
            <option value="fallback">Fallback</option>
            <option value="missing">Missing</option>
          </select>

          <label for="materialNameFilter">Search</label>
          <input id="materialNameFilter" type="text" placeholder="Filter by material name..." style="width:220px" />

          <button class="btn btn-primary" onclick="loadSheet()">Load Sheet</button>
        </div>

        <div class="actions">
          <button class="btn btn-primary" onclick="window.location.href='/rm-prices/availability'">Material Availability Matrix</button>
          <button class="btn btn-primary" onclick="window.location.href='/rm-prices/roll'">Roll Prices</button>
          <button class="btn btn-secondary" onclick="exportSheetCsv()">Export Sheet CSV</button>
          <button class="btn btn-secondary" onclick="exportSheetExcel()">Export Sheet Excel</button>
          <button class="btn btn-secondary" onclick="exportMissing()">Export Missing</button>
          <button id="recalcBtn" class="btn btn-success hidden" onclick="recalculatePolymers()">Recalculate Polymers</button>
        </div>
      </div>

      <div id="status" class="status"></div>
      <div id="summary" class="small-note"></div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Category</th>
              <th>Material</th>
              <th>Status</th>
              <th>Price</th>
              <th>Currency</th>
              <th>Source</th>
              <th>Origin Month</th>
              <th id="editHead">Edit</th>
            </tr>
          </thead>
          <tbody id="sheetBody"></tbody>
        </table>
      </div>

      <div id="adminTools" class="admin-tools hidden">
        <h3>Update Tools</h3>

        <div class="admin-grid" style="margin-bottom: 12px;">
          <div>
            <label for="materialListKey">Category</label>
            <select id="materialListKey">
              <option value="list_sb">SB polymer</option>
              <option value="list_mb">MB polymer</option>
              <option value="list_pigment">Pigment</option>
              <option value="list_additive">Additive</option>
              <option value="list_surfactant">Surfactant</option>
            </select>
          </div>
          <div>
            <label for="materialName">New Material Name</label>
            <input id="materialName" type="text" placeholder="Material name" />
          </div>
          <div>
            <label for="surfactantValue">Surfactant conc. (optional)</label>
            <input id="surfactantValue" type="number" step="0.0001" placeholder="e.g. 0.82" />
          </div>
          <div>
            <label for="plantsInput">Plants (comma separated)</label>
            <input id="plantsInput" type="text" placeholder="CZ,EG,ZA" value="CZ,EG,ZA" />
          </div>
        </div>
        <button class="btn btn-primary" onclick="addMaterial()">Add Material to BOM Lists</button>

        <div style="margin-top: 16px;">
          <label for="importJson"><strong>Import prices (JSON rows)</strong></label>
          <textarea id="importJson" rows="5" style="width:100%;margin-top:6px;border:1px solid #cfd8e3;border-radius:6px;padding:8px;" placeholder='[{"year":2026,"month":3,"material_list_key":"list_pigment","material_name":"Black 01","plant":"CZ","currency":"EUR","price":1.34}]'></textarea>
          <div style="margin-top:8px;">
            <button class="btn btn-primary" onclick="importPrices()">Import JSON</button>
          </div>
        </div>

        <div style="margin-top: 16px;">
          <label for="nonPolymerFile"><strong>Import non-polymer prices (CSV/XLSX)</strong></label>
          <input id="nonPolymerFile" type="file" accept=".csv,.xlsx,.xls" style="display:block;margin-top:6px;" />
          <div class="small-note" style="margin-top:6px;">
            Required columns: material_list_key, material_name, plant, year, month, price, currency.
            Polymer categories (list_sb, list_mb) are skipped.
          </div>
          <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;">
            <button class="btn btn-primary" onclick="importNonPolymerFile()">Import CSV/XLSX</button>
            <button class="btn btn-secondary" onclick="downloadNonPolymerTemplate()">Download CSV Template</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/auth.js"></script>
  <script>
    let canManage = false;
    let currentRows = [];
    let visibleRows = [];

    function setStatus(message, type = '') {
      const el = document.getElementById('status');
      el.textContent = message || '';
      el.className = `status ${type}`.trim();
    }

    function currentPeriodDefaults() {
      const now = new Date();
      document.getElementById('yearInput').value = now.getFullYear();
      document.getElementById('monthInput').value = now.getMonth() + 1;
    }

    async function detectManagePermission() {
      try {
        const meResp = await fetch('/api/auth/me', { headers: { Authorization: `Bearer ${auth.getToken()}` } });
        const me = meResp.ok ? await meResp.json() : null;

        if (me && me.role === 'admin') {
          canManage = true;
        } else {
          const groupsResp = await fetch('/api/auth/me/groups', { headers: { Authorization: `Bearer ${auth.getToken()}` } });
          const groups = groupsResp.ok ? await groupsResp.json() : [];
          canManage = (groups || []).some(g => Array.isArray(g.permissions) && g.permissions.includes('rm_prices:manage'));
        }
      } catch (_) {
        canManage = false;
      }

      document.getElementById('adminTools').classList.toggle('hidden', !canManage);
      document.getElementById('recalcBtn').classList.toggle('hidden', !canManage);
      document.getElementById('editHead').style.display = canManage ? '' : 'none';
    }

    function categoryLabel(listKey) {
      const map = {
        list_sb: 'SB polymer',
        list_mb: 'MB polymer',
        list_pigment: 'Pigment',
        list_additive: 'Additive',
        list_surfactant: 'Surfactant'
      };
      return map[listKey] || listKey;
    }

    function periodLabel(year, month) {
      if (!year || !month) return 'N/A';
      return `${String(month).padStart(2, '0')}/${year}`;
    }

    function formatPriceDisplay(value) {
      const numeric = Number(value);
      return Number.isFinite(numeric) ? numeric.toFixed(2) : value;
    }

    function statusLabel(status) {
      return status === 'priced'
        ? 'Priced'
        : (status === 'fallback' ? 'Fallback' : 'Missing');
    }

    function getFilteredRows() {
      const categoryFilter = document.getElementById('categoryFilter').value;
      const statusFilter = document.getElementById('statusFilter').value;
      const nameFilter = (document.getElementById('materialNameFilter').value || '').trim().toLowerCase();
      return currentRows.filter((row) => {
        if (categoryFilter && row.material_list_key !== categoryFilter) return false;
        if (statusFilter && row.status !== statusFilter) return false;
        if (nameFilter && !(row.material_name || '').toLowerCase().includes(nameFilter)) return false;
        return true;
      });
    }

    function renderCurrentSheet() {
      visibleRows = getFilteredRows();
      renderSheet(visibleRows);

      const { year, month, plant } = getCurrentSheetContext();
      const missingCount = visibleRows.filter((row) => row.missing).length;
      const categoryFilter = document.getElementById('categoryFilter').value;
      const categoryLabel2 = categoryFilter ? categoryLabel(categoryFilter) : 'all';
      const statusVal = document.getElementById('statusFilter').value || 'all';
      const nameFilter = (document.getElementById('materialNameFilter').value || '').trim();
      const filterParts = [];
      if (categoryFilter) filterParts.push(categoryLabel2);
      filterParts.push(statusVal);
      if (nameFilter) filterParts.push(`"${nameFilter}"`);
      document.getElementById('summary').textContent = `Plant ${plant} | Period ${periodLabel(year, month)} | Visible materials: ${visibleRows.length} | Missing: ${missingCount} | Filter: ${filterParts.join(' / ')}`;
    }

    async function loadSheet() {
      setStatus('Loading...', '');
      const year = Number(document.getElementById('yearInput').value);
      const month = Number(document.getElementById('monthInput').value);
      const plant = document.getElementById('plantSelect').value;

      try {
        const response = await fetch(`/api/rm-prices/sheet?year=${year}&month=${month}&plant=${encodeURIComponent(plant)}`, {
          headers: { Authorization: `Bearer ${auth.getToken()}` }
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Failed to load sheet');

        currentRows = data.rows || [];
        renderCurrentSheet();
        setStatus('Sheet loaded.', 'ok');
      } catch (err) {
        setStatus(`Error: ${err.message}`, 'error');
      }
    }

    function renderSheet(rows) {
      const tbody = document.getElementById('sheetBody');
      tbody.innerHTML = '';

      rows.forEach((row) => {
        const tr = document.createElement('tr');
        tr.className = row.status === 'missing' ? 'missing' : (row.status === 'fallback' ? 'fallback' : '');

        const statusText = statusLabel(row.status);

        const editCell = canManage
          ? `<td>
              <div class="inline-edit">
                <input type="number" step="0.01" id="price-${escapeId(row.material_list_key)}-${escapeId(row.material_name)}" value="${row.price === null || row.price === undefined || row.price === '' ? '' : formatPriceDisplay(row.price)}" placeholder="price" />
                <input type="text" id="cur-${escapeId(row.material_list_key)}-${escapeId(row.material_name)}" value="${row.currency ?? ''}" placeholder="cur" />
                <button class="btn btn-primary" onclick="saveRowPrice('${row.material_list_key}','${escapeJs(row.material_name)}')">Save</button>
              </div>
            </td>`
          : '';

        tr.innerHTML = `
          <td>${escapeHtml(categoryLabel(row.material_list_key))}</td>
          <td>${escapeHtml(row.material_name)}</td>
          <td>${statusText}</td>
          <td>${row.price === null ? 'N/A' : formatPriceDisplay(row.price)}</td>
          <td>${escapeHtml(row.currency || 'N/A')}</td>
          <td>${escapeHtml(row.price_source || 'N/A')}</td>
          <td>${periodLabel(row.origin_year, row.origin_month)}</td>
          ${editCell}
        `;

        tbody.appendChild(tr);
      });

      if (!canManage) {
        Array.from(document.querySelectorAll('#sheetBody tr td:last-child')).forEach((cell) => {
          cell.style.display = 'none';
        });
      }
    }

    async function saveRowPrice(materialListKey, materialName) {
      const year = Number(document.getElementById('yearInput').value);
      const month = Number(document.getElementById('monthInput').value);
      const plant = document.getElementById('plantSelect').value;

      const priceEl = document.getElementById(`price-${escapeId(materialListKey)}-${escapeId(materialName)}`);
      const curEl = document.getElementById(`cur-${escapeId(materialListKey)}-${escapeId(materialName)}`);

      try {
        const response = await fetch('/api/rm-prices', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${auth.getToken()}`
          },
          body: JSON.stringify({
            material_list_key: materialListKey,
            material_name: materialName,
            plant,
            year,
            month,
            price: Number(priceEl.value),
            currency: String(curEl.value || '').trim().toUpperCase()
          })
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Save failed');

        setStatus(`Saved: ${materialName}`, 'ok');
        await loadSheet();
      } catch (err) {
        setStatus(`Error: ${err.message}`, 'error');
      }
    }

    async function recalculatePolymers() {
      const year = Number(document.getElementById('yearInput').value);
      const month = Number(document.getElementById('monthInput').value);
      const plant = document.getElementById('plantSelect').value;

      try {
        const response = await fetch('/api/rm-prices/calculate-polymer', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${auth.getToken()}`
          },
          body: JSON.stringify({ plant, year, month })
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Calculation failed');

        setStatus(`Polymer prices recalculated. Updated: ${data.result.updated}, skipped: ${data.result.skipped.length}`, 'ok');
        await loadSheet();
      } catch (err) {
        setStatus(`Error: ${err.message}`, 'error');
      }
    }

    async function addMaterial() {
      const material_list_key = document.getElementById('materialListKey').value;
      const material_name = document.getElementById('materialName').value.trim();
      const numeric_value_raw = document.getElementById('surfactantValue').value;
      const plants = String(document.getElementById('plantsInput').value || '')
        .split(',')
        .map(v => v.trim().toUpperCase())
        .filter(Boolean);

      if (!material_name) {
        setStatus('Material name is required.', 'error');
        return;
      }

      const numeric_value = numeric_value_raw === '' ? null : Number(numeric_value_raw);

      try {
        const response = await fetch('/api/rm-prices/materials/add', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${auth.getToken()}`
          },
          body: JSON.stringify({ material_list_key, material_name, numeric_value, plants })
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Add material failed');

        setStatus(`Material added: ${material_name}`, 'ok');
        document.getElementById('materialName').value = '';
        document.getElementById('surfactantValue').value = '';
        await loadSheet();
      } catch (err) {
        setStatus(`Error: ${err.message}`, 'error');
      }
    }

    async function importPrices() {
      const raw = document.getElementById('importJson').value.trim();
      if (!raw) {
        setStatus('Import JSON is empty.', 'error');
        return;
      }

      let rows = [];
      try {
        rows = JSON.parse(raw);
      } catch (err) {
        setStatus(`Invalid JSON: ${err.message}`, 'error');
        return;
      }

      try {
        const response = await fetch('/api/rm-prices/import', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${auth.getToken()}`
          },
          body: JSON.stringify({ rows })
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Import failed');

        const result = data.result || {};
        setStatus(`Import done. Upserted: ${result.upserted || 0}, errors: ${(result.errors || []).length}`, 'ok');
        await loadSheet();
      } catch (err) {
        setStatus(`Error: ${err.message}`, 'error');
      }
    }

    async function importNonPolymerFile() {
      const fileInput = document.getElementById('nonPolymerFile');
      const file = fileInput && fileInput.files ? fileInput.files[0] : null;

      if (!file) {
        setStatus('Select a CSV or XLSX file first.', 'error');
        return;
      }

      try {
        const rows = await parseNonPolymerImportFile(file);
        if (!rows.length) {
          setStatus('No data rows found in file.', 'error');
          return;
        }

        const response = await fetch('/api/rm-prices/import-non-polymer', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${auth.getToken()}`
          },
          body: JSON.stringify({ rows })
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Import failed');

        const result = data.result || {};
        setStatus(
          `Import done. Upserted: ${result.upserted || 0}, errors: ${(result.errors || []).length}, skipped polymer: ${result.skipped_polymer || 0}`,
          'ok'
        );

        fileInput.value = '';
        await loadSheet();
      } catch (err) {
        setStatus(`Error: ${err.message}`, 'error');
      }
    }

    function parseNonPolymerImportFile(file) {
      if (typeof XLSX === 'undefined') {
        throw new Error('XLSX parser is not available');
      }

      return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onload = () => {
          try {
            const data = new Uint8Array(reader.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const firstSheetName = workbook.SheetNames[0];
            if (!firstSheetName) {
              resolve([]);
              return;
            }

            const sheet = workbook.Sheets[firstSheetName];
            const rawRows = XLSX.utils.sheet_to_json(sheet, { defval: '' });
            const mappedRows = rawRows
              .map((row) => mapImportRow(row))
              .filter((row) => Object.values(row).some((value) => String(value ?? '').trim() !== ''));

            resolve(mappedRows);
          } catch (error) {
            reject(error);
          }
        };

        reader.onerror = () => reject(new Error('Failed to read file'));
        reader.readAsArrayBuffer(file);
      });
    }

    function mapImportRow(rawRow) {
      const keyMap = {};
      Object.keys(rawRow || {}).forEach((key) => {
        const normalized = normalizeImportHeader(key);
        keyMap[normalized] = rawRow[key];
      });

      return {
        material_list_key: pickImportValue(keyMap, ['material_list_key', 'list_key', 'category', 'material_category']),
        material_name: pickImportValue(keyMap, ['material_name', 'name', 'material']),
        plant: pickImportValue(keyMap, ['plant', 'country']),
        year: normalizeImportNumber(pickImportValue(keyMap, ['year'])),
        month: normalizeImportNumber(pickImportValue(keyMap, ['month'])),
        price: normalizeImportNumber(pickImportValue(keyMap, ['price'])),
        currency: pickImportValue(keyMap, ['currency'])
      };
    }

    function normalizeImportHeader(header) {
      return String(header || '')
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '_')
        .replace(/^_+|_+$/g, '');
    }

    function pickImportValue(keyMap, keys) {
      for (const key of keys) {
        if (Object.prototype.hasOwnProperty.call(keyMap, key)) {
          return keyMap[key];
        }
      }
      return '';
    }

    function normalizeImportNumber(value) {
      const text = String(value ?? '').trim();
      if (!text) return '';

      const normalized = text.replace(',', '.');
      const numeric = Number(normalized);
      return Number.isFinite(numeric) ? numeric : value;
    }

    function downloadNonPolymerTemplate() {
      const lines = [
        'material_list_key,material_name,plant,year,month,price,currency',
        'list_pigment,Black 01,CZ,2026,3,1.34,EUR',
        'list_additive,Additive A,EG,2026,3,2.10,USD',
        'list_surfactant,Surfactant S,ZA,2026,3,0.82,EUR'
      ];

      const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'rm-prices-non-polymer-template.csv';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function getCurrentSheetContext() {
      return {
        year: document.getElementById('yearInput').value,
        month: document.getElementById('monthInput').value,
        plant: document.getElementById('plantSelect').value
      };
    }

    function buildSheetExportRows() {
      const { year, month, plant } = getCurrentSheetContext();
      return visibleRows.map((row) => ({
        plant,
        year,
        month,
        category: categoryLabel(row.material_list_key),
        material_list_key: row.material_list_key,
        material_name: row.material_name,
        status: row.status,
        price: row.price === null ? '' : formatPriceDisplay(row.price),
        currency: row.currency || '',
        source: row.price_source || '',
        origin_month: periodLabel(row.origin_year, row.origin_month),
        missing: row.missing ? 'yes' : 'no'
      }));
    }

    function exportSheetCsv() {
      if (!visibleRows.length) {
        setStatus('Load a price sheet before exporting.', 'error');
        return;
      }

      const rows = buildSheetExportRows();
      const headers = ['plant', 'year', 'month', 'category', 'material_list_key', 'material_name', 'status', 'price', 'currency', 'source', 'origin_month', 'missing'];
      const lines = [headers.join(',')];

      rows.forEach((row) => {
        lines.push(headers.map((header) => csvEscape(row[header])).join(','));
      });

      const { plant, year, month } = getCurrentSheetContext();
      const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `rm-price-sheet-${plant}-${year}-${month}.csv`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function exportSheetExcel() {
      if (!visibleRows.length) {
        setStatus('Load a price sheet before exporting.', 'error');
        return;
      }
      if (typeof XLSX === 'undefined') {
        setStatus('XLSX export is not available.', 'error');
        return;
      }

      const rows = buildSheetExportRows();
      const worksheet = XLSX.utils.json_to_sheet(rows);
      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, worksheet, 'RM Price Sheet');

      const { plant, year, month } = getCurrentSheetContext();
      XLSX.writeFile(workbook, `rm-price-sheet-${plant}-${year}-${month}.xlsx`);
    }

    function exportMissing() {
      const missing = visibleRows.filter(r => r.missing);
      const lines = ['material_list_key,material_name,plant,year,month,status'];
      const year = document.getElementById('yearInput').value;
      const month = document.getElementById('monthInput').value;
      const plant = document.getElementById('plantSelect').value;

      missing.forEach(r => {
        lines.push([r.material_list_key, r.material_name, plant, year, month, r.status].map(csvEscape).join(','));
      });

      const blob = new Blob([lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `missing-prices-${plant}-${year}-${month}.csv`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function csvEscape(value) {
      const text = String(value ?? '');
      if (text.includes(',') || text.includes('"') || text.includes('\n')) {
        return `"${text.replace(/"/g, '""')}"`;
      }
      return text;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = String(text ?? '');
      return div.innerHTML;
    }

    function escapeId(text) {
      return String(text).replace(/[^a-zA-Z0-9_-]/g, '_');
    }

    function escapeJs(text) {
      return String(text).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    }

    document.addEventListener('DOMContentLoaded', async () => {
      if (!auth.isAuthenticated()) {
        window.location.href = '/login.html';
        return;
      }

      await auth.configureHeaderButtons();
      currentPeriodDefaults();
      await detectManagePermission();
      await loadSheet();
      document.getElementById('statusFilter').addEventListener('change', renderCurrentSheet);
      document.getElementById('materialNameFilter').addEventListener('input', renderCurrentSheet);
    });
  </script>
</body>
