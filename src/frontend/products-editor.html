<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Product Editor - Manufacturing Cost ERP</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .editor-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    .editor-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      border-bottom: 2px solid #667eea;
      padding-bottom: 15px;
    }

    .editor-header h1 {
      margin: 0;
      color: #1e3a8a;
      font-size: 2em;
    }

    .back-link {
      padding: 8px 16px;
      background: #e0e0e0;
      border-radius: 6px;
      text-decoration: none;
      color: #333;
      font-weight: 500;
      cursor: pointer;
      border: none;
    }

    .back-link:hover {
      background: #d0d0d0;
    }

    .search-box {
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
    }

    .search-box input {
      flex: 1;
      max-width: 400px;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }

    .search-box button {
      padding: 10px 20px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }

    .search-box button:hover {
      background: #5568d3;
    }

    .products-table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      overflow: hidden;
    }

    .products-table thead {
      background: linear-gradient(135deg, #2b6cb0 0%, #1e40af 100%);
      color: white;
    }

    .products-table thead th {
      padding: 12px;
      text-align: left;
      font-size: 0.85em;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .products-table tbody tr {
      border-bottom: 1px solid #e0e0e0;
      transition: background 0.2s;
    }

    .products-table tbody tr:hover {
      background: #f5f5f5;
    }

    .products-table td {
      padding: 10px 12px;
      font-size: 0.9em;
    }

    .edit-btn {
      padding: 6px 12px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85em;
      font-weight: 600;
    }

    .edit-btn:hover {
      background: #2563eb;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(14, 42, 75, 0.45);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 12px;
      padding: 30px;
      max-width: 90vw;
      width: 1000px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
      position: relative;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      border-bottom: 2px solid #667eea;
      padding-bottom: 15px;
    }

    .modal-header h2 {
      margin: 0;
      color: #667eea;
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #999;
      padding: 0;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .close-btn:hover {
      color: #333;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      color: #333;
      font-size: 0.9em;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.9em;
      font-family: inherit;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
    }

    .form-actions {
      display: flex;
      gap: 10px;
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid #e0e0e0;
    }

    .save-btn {
      flex: 1;
      padding: 10px;
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.95em;
    }

    .save-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }

    .cancel-btn {
      flex: 1;
      padding: 10px;
      background: #e0e0e0;
      color: #333;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.95em;
    }

    .cancel-btn:hover {
      background: #d0d0d0;
    }

    .message {
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 15px;
      font-weight: 500;
      display: none;
    }

    .message.success {
      background: #d4edda;
      color: #155724;
      display: block;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
      display: block;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    .empty {
      text-align: center;
      padding: 40px;
      color: #999;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="editor-container">
      <div class="editor-header">
        <h1>Product Data Editor</h1>
        <div style="display: flex; gap: 10px;">
          <button class="back-link" onclick="window.location.href='/dashboard'">← Back to Dashboard</button>
          <button class="logout-btn" onclick="logoutHandler()">Logout</button>
        </div>
      </div>

      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by SAP ID, PFN ID, Customer, Market Segment, or Application..." />
        <button onclick="searchProducts()">Search</button>
        <button onclick="loadProducts()" style="background: #6c757d;">Reset</button>
      </div>

      <div id="messageBox" class="message"></div>

      <div id="loadingSpinner" class="loading" style="display: none;">
        <p>Loading products...</p>
      </div>

      <div id="productsContainer">
        <!-- Table will be rendered here -->
      </div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div id="editModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Edit Product</h2>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>

      <div id="modalMessage" class="message"></div>

      <form id="editForm">
        <div class="form-group">
          <label for="sapId">SAP ID</label>
          <input type="text" id="sapId" name="sapId" />
        </div>

        <div class="form-group">
          <label for="pfnId">PFN ID</label>
          <input type="text" id="pfnId" name="pfnId" />
        </div>

        <div class="form-group">
          <label for="customer">Customer</label>
          <input type="text" id="customer" name="customer" />
        </div>

        <div class="form-group">
          <label for="marketSegment">Market Segment</label>
          <input type="text" id="marketSegment" name="marketSegment" />
        </div>

        <div class="form-group">
          <label for="application">Application</label>
          <input type="text" id="application" name="application" />
        </div>

        <div class="form-group">
          <label for="s_sms">S/SMS</label>
          <input type="text" id="s_sms" name="s_sms" />
        </div>

        <div class="form-group">
          <label for="bonding">Bonding</label>
          <input type="text" id="bonding" name="bonding" />
        </div>

        <div class="form-group">
          <label for="basisWeight">Basis Weight</label>
          <input type="text" id="basisWeight" name="basisWeight" />
        </div>

        <div class="form-group">
          <label for="slitWidth">Slit Width</label>
          <input type="text" id="slitWidth" name="slitWidth" placeholder="e.g., 1000" />
        </div>

        <div class="form-group">
          <label for="treatment">Treatment</label>
          <input type="text" id="treatment" name="treatment" />
        </div>

        <div class="form-group">
          <label for="author">Author</label>
          <input type="text" id="author" name="author" />
        </div>

        <div class="form-group">
          <label for="lineId">Line</label>
          <input type="text" id="lineId" name="lineId" />
        </div>

        <div class="form-group">
          <label for="country">Country</label>
          <input type="text" id="country" name="country" />
        </div>

        <div class="form-group">
          <label for="grossYield">Gross Yield (%)</label>
          <input type="number" id="grossYield" name="grossYield" placeholder="e.g., 78.45" step="0.01" />
        </div>

        <div class="form-group">
          <label for="throughput">Throughput</label>
          <input type="number" id="throughput" name="throughput" step="0.01" />
        </div>

        <div class="form-group">
          <label for="overconsumption">Overconsumption (%)</label>
          <input type="number" id="overconsumption" name="overconsumption" placeholder="e.g., 5.25" step="0.01" />
        </div>

        <h3 style="color: #667eea; margin-top: 25px; margin-bottom: 15px;">Bill of Materials (BOM)</h3>
        <table id="bomTable" style="width: 100%; border-collapse: collapse; margin-bottom: 15px; border: 1px solid #ddd;">
          <thead style="background: #e8eaf6;">
            <tr>
              <th style="padding: 8px; text-align: left; border: 1px solid #ddd;">Material</th>
              <th style="padding: 8px; text-align: right; border: 1px solid #ddd; width: 100px;">Percentage</th>
              <th style="padding: 8px; text-align: center; border: 1px solid #ddd; width: 80px;">Action</th>
            </tr>
          </thead>
          <tbody id="bomTableBody">
          </tbody>
        </table>

        <div style="display: flex; gap: 10px; margin-bottom: 20px; align-items: center;">
          <select id="bomCategory" style="padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.9em; background: white; cursor: pointer;">
            <option value="">-- Select Category --</option>
            <option value="PE">PE (Polyethylene)</option>
            <option value="SB">SB (Spunbond)</option>
            <option value="MB">MB (Meltblown)</option>
            <option value="Color">Color</option>
            <option value="Softener">Softener</option>
            <option value="Additive">Additive</option>
          </select>
          <input type="number" id="bomCategoryIndex" placeholder="#" style="width: 50px; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.9em;" min="1" max="9" />
          <input type="text" id="newMaterial" placeholder="Material name" style="flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.9em;" />
          <input type="number" id="newPercentage" placeholder="e.g., 80.56" style="width: 100px; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.9em;" step="0.01" />
          <span style="padding: 8px; color: #666; font-weight: 600;">%</span>
          <button type="button" onclick="addBomItem()" style="padding: 8px 12px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 600;">Add</button>
        </div>

        <div class="form-actions">
          <button type="button" class="save-btn" onclick="saveProduct()">Save Changes</button>
          <button type="button" class="cancel-btn" onclick="closeModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let currentRow = null;
    let currentBom = [];
    let editingBomIndex = null;
    let editingBomItem = null;

    // Load and display products
    async function loadProducts() {
      showLoading(true);
      clearMessage();

      try {
        const response = await fetch("/api/products/editable");
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Failed to load products");
        }

        displayProducts(data.products);
      } catch (err) {
        showMessage("Error: " + err.message, "error");
      } finally {
        showLoading(false);
      }
    }

    // Search products
    async function searchProducts() {
      const query = document.getElementById("searchInput").value;
      showLoading(true);
      clearMessage();

      try {
        const response = await fetch(`/api/products/editable?search=${encodeURIComponent(query)}`);
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Failed to search products");
        }

        displayProducts(data.products);
      } catch (err) {
        showMessage("Error: " + err.message, "error");
      } finally {
        showLoading(false);
      }
    }

    // Display products in table
    function displayProducts(products) {
      const container = document.getElementById("productsContainer");

      if (!products || products.length === 0) {
        container.innerHTML = '<div class="empty">No products found.</div>';
        return;
      }

      let html = `
        <table class="products-table">
          <thead>
            <tr>
              <th>SAP ID</th>
              <th>PFN ID</th>
              <th>Customer</th>
              <th>Market Segment</th>
              <th>Application</th>
              <th>Slit Width</th>
              <th>Treatment</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
      `;

      products.forEach((product, idx) => {
        html += `
          <tr>
            <td>${product.sapId || "-"}</td>
            <td>${product.pfnId || "-"}</td>
            <td>${product.customer || "-"}</td>
            <td>${product.marketSegment || "-"}</td>
            <td>${product.application || "-"}</td>
            <td>${product.slitWidth || "-"}</td>
            <td>${product.treatment || "-"}</td>
            <td>
              <button class="edit-btn" onclick="openEditModal(${product.rowIndex})">Edit</button>
              <button class="copy-btn" onclick="copyProduct(${product.rowIndex})" style="margin-left: 4px; background: #17a2b8; padding: 4px 8px; color: white;">Copy</button>
              <button class="delete-btn" onclick="deleteProduct(${product.rowIndex})" style="margin-left: 4px; background: #1e3a8a; padding: 4px 8px; color: #ffb3ba; font-weight: 600;">Delete</button>
            </td>
          </tr>
        `;
      });

      html += `
          </tbody>
        </table>
      `;

      container.innerHTML = html;
    }

    // Copy product
    async function copyProduct(rowIndex) {
      try {
        showMessage("Creating copy...", "info", "main");
        const response = await fetch("/api/products/duplicate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ rowIndex })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Failed to copy product");
        }

        // Open the edit modal for the newly created product
        // Don't filter, get all products so we can find the new one
        const allResponse = await fetch("/api/products/editable");
        const allData = await allResponse.json();
        
        const newProduct = allData.products.find(p => p.rowIndex === data.newRowIndex);
        if (newProduct) {
          // Set SAP ID and PFN ID to TBD for the copy
          newProduct.sapId = "TBD";
          newProduct.pfnId = "TBD";
          
          // Open edit modal with the new product
          currentRow = data.newRowIndex;
          currentBom = JSON.parse(JSON.stringify(newProduct.bom || []));
          editingBomIndex = null;
          editingBomItem = null;

          // Populate basic fields
          document.getElementById("sapId").value = "TBD";
          document.getElementById("pfnId").value = "TBD";
          document.getElementById("customer").value = newProduct.customer || "";
          document.getElementById("marketSegment").value = newProduct.marketSegment || "";
          document.getElementById("application").value = newProduct.application || "";
          document.getElementById("s_sms").value = newProduct.s_sms || "";
          document.getElementById("bonding").value = newProduct.bonding || "";
          document.getElementById("basisWeight").value = newProduct.basisWeight || "";
          document.getElementById("slitWidth").value = newProduct.slitWidth || "";
          document.getElementById("treatment").value = newProduct.treatment || "";
          document.getElementById("author").value = newProduct.author || "";
          document.getElementById("lineId").value = newProduct.lineId || "";
          document.getElementById("country").value = newProduct.country || "";
          // Convert gross yield and overconsumption from decimal to percentage for display
          document.getElementById("grossYield").value = newProduct.grossYield ? ((newProduct.grossYield * 100).toFixed(2)) : "";
          document.getElementById("throughput").value = newProduct.throughput || "";
          document.getElementById("overconsumption").value = newProduct.overconsumption ? ((newProduct.overconsumption * 100).toFixed(2)) : "";

          // Clear BOM input fields
          document.getElementById("bomCategory").value = "";
          document.getElementById("bomCategoryIndex").value = "";
          document.getElementById("newMaterial").value = "";
          document.getElementById("newPercentage").value = "";
          document.querySelector("button[onclick='addBomItem()']").textContent = "Add";

          // Display BOM
          displayBom();

          clearMessage();
          document.getElementById("editModal").classList.add("active");
          showMessage("Product copied! Edit the TBD fields as needed and click Save.", "success", "modal");
        }
      } catch (err) {
        showMessage("Error: " + err.message, "error", "main");
      }
    }

    // Delete product
    async function deleteProduct(rowIndex) {
      // Show confirmation dialog
      const confirmed = confirm("Do you really want to delete this row?");
      if (!confirmed) {
        return; // User cancelled the deletion
      }

      try {
        showMessage("Deleting product...", "info", "main");
        const response = await fetch("/api/products/delete", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ rowIndex })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Failed to delete product");
        }

        showMessage("Product deleted successfully!", "success", "main");
        
        // Reload the product list
        setTimeout(() => {
          loadProducts();
        }, 1000);
      } catch (err) {
        showMessage("Error: " + err.message, "error", "main");
      }
    }

    // Open edit modal
    function openEditModal(rowIndex) {
      fetch(`/api/products/editable?search=`)
        .then(r => r.json())
        .then(data => {
          const product = data.products.find(p => p.rowIndex === rowIndex);
          if (!product) {
            showMessage("Product not found", "error");
            return;
          }

          currentRow = rowIndex;
          currentBom = JSON.parse(JSON.stringify(product.bom || []));
          editingBomIndex = null;
          editingBomItem = null;

          // Populate basic fields
          document.getElementById("sapId").value = product.sapId || "";
          document.getElementById("pfnId").value = product.pfnId || "";
          document.getElementById("customer").value = product.customer || "";
          document.getElementById("marketSegment").value = product.marketSegment || "";
          document.getElementById("application").value = product.application || "";
          document.getElementById("s_sms").value = product.s_sms || "";
          document.getElementById("bonding").value = product.bonding || "";
          document.getElementById("basisWeight").value = product.basisWeight || "";
          document.getElementById("slitWidth").value = product.slitWidth || "";
          document.getElementById("treatment").value = product.treatment || "";
          document.getElementById("author").value = product.author || "";
          document.getElementById("lineId").value = product.lineId || "";
          document.getElementById("country").value = product.country || "";
          // Convert gross yield and overconsumption from decimal to percentage for display
          document.getElementById("grossYield").value = product.grossYield ? ((product.grossYield * 100).toFixed(2)) : "";
          document.getElementById("throughput").value = product.throughput || "";
          document.getElementById("overconsumption").value = product.overconsumption ? ((product.overconsumption * 100).toFixed(2)) : "";

          // Clear BOM input fields
          document.getElementById("bomCategory").value = "";
          document.getElementById("bomCategoryIndex").value = "";
          document.getElementById("newMaterial").value = "";
          document.getElementById("newPercentage").value = "";
          document.querySelector("button[onclick='addBomItem()']").textContent = "Add";

          // Display BOM
          displayBom();

          clearMessage("modal");
          document.getElementById("editModal").classList.add("active");
        })
        .catch(err => showMessage("Error: " + err.message, "error"));
    }

    // Display BOM materials in table
    function displayBom() {
      const tbody = document.getElementById("bomTableBody");
      tbody.innerHTML = "";

      if (!currentBom || currentBom.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" style="padding: 12px; text-align: center; color: #999;">No materials in BOM</td></tr>';
        return;
      }

      currentBom.forEach((item, idx) => {
        // Show category field mapping if available
        let categoryDisplay = '';
        if (item.baseField) {
          categoryDisplay = ` <span style="color: #999; font-size: 0.85em; font-weight: 500;">[${item.baseField}]</span>`;
        } else if (item.percentField) {
          // For special fields like Siko%, Repro% that don't have baseField
          categoryDisplay = ` <span style="color: #999; font-size: 0.85em; font-weight: 500;">[${item.percentField}]</span>`;
        }
        const materialDisplay = item.material + categoryDisplay;
        
        const html = `
          <tr style="border-bottom: 1px solid #ddd;">
            <td style="padding: 8px; border-right: 1px solid #ddd;">${materialDisplay || '-'}</td>
            <td style="padding: 8px; text-align: right; border-right: 1px solid #ddd;">${((item.percentage || 0) * 100).toFixed(2)}%</td>
            <td style="padding: 8px; text-align: center;">
              <button type="button" onclick="editBomItem(${idx})" style="padding: 4px 8px; background: #ffc107; color: white; border: none; border-radius: 3px; cursor: pointer; font-size: 0.8em; margin-right: 4px;">Edit</button>
              <button type="button" onclick="removeBomItem(${idx})" style="padding: 4px 8px; background: #dc3545; color: white; border: none; border-radius: 3px; cursor: pointer; font-size: 0.8em;">Delete</button>
            </td>
          </tr>
        `;
        tbody.innerHTML += html;
      });
    }

    // Add or update BOM item
    function addBomItem() {
      const material = document.getElementById("newMaterial").value.trim();
      const percentageInput = parseFloat(document.getElementById("newPercentage").value);
      // Convert from percentage (80.56) to decimal (0.8056)
      const percentage = percentageInput / 100;

      if (!material) {
        alert("Please enter a material name");
        return;
      }

      if (isNaN(percentage) || percentage < 0) {
        alert("Please enter a valid percentage");
        return;
      }

      // If editing an existing item, update it with preserved field mappings
      if (editingBomIndex !== null) {
        let baseField = editingBomItem.baseField;
        let percentField = editingBomItem.percentField;

        // Check if user is trying to move to a different category/index
        const newCategory = document.getElementById("bomCategory").value.trim();
        const newCategoryIndex = parseInt(document.getElementById("bomCategoryIndex").value);

        if (newCategory) {
          // User is trying to change the category/index location
          if (isNaN(newCategoryIndex) || newCategoryIndex < 1 || newCategoryIndex > 9) {
            alert("Please enter a valid category index between 1 and 9");
            return;
          }

          const newBaseField = newCategory + newCategoryIndex;
          const newPercentField = newCategory + newCategoryIndex + "%";

          // Check if the new location is different from the current one
          if (newBaseField !== editingBomItem.baseField) {
            // Check if this new location is already in use by another item
            const isNewLocationInUse = currentBom.some((item, index) => 
              index !== editingBomIndex && item.baseField === newBaseField
            );

            if (isNewLocationInUse) {
              alert(newBaseField + " is already in use by another material.\n\nPlease choose a different index or category.");
              return;
            }

            // New location is available, use it
            baseField = newBaseField;
            percentField = newPercentField;
          }
        }

        // Update the item with new or preserved field mappings
        currentBom[editingBomIndex] = {
          material: material,
          percentage: percentage,
          baseField: baseField,
          percentField: percentField
        };
        editingBomIndex = null;
        editingBomItem = null;
      } else {
        // Adding new item - require category designation
        const category = document.getElementById("bomCategory").value.trim();
        const categoryIndex = parseInt(document.getElementById("bomCategoryIndex").value);

        if (!category) {
          alert("Please select a material category:\n• PE (Polyethylene)\n• SB (Spunbond)\n• MB (Meltblown)\n• Color\n• Softener\n• Additive");
          return;
        }

        if (isNaN(categoryIndex) || categoryIndex < 1 || categoryIndex > 9) {
          alert("Please enter a category index between 1 and 9");
          return;
        }

        // Check if this category slot is already in use
        const baseField = category + categoryIndex;
        const percentField = category + categoryIndex + "%";
        
        const categoryExists = currentBom.some(item => item.baseField === baseField);
        if (categoryExists) {
          alert(baseField + " is already in use.\n\nPlease choose a different index or category.");
          return;
        }

        // Add new item with proper field mapping
        currentBom.push({
          material: material,
          percentage: percentage,
          baseField: baseField,
          percentField: percentField
        });
      }

      document.getElementById("bomCategory").value = "";
      document.getElementById("bomCategoryIndex").value = "";
      document.getElementById("newMaterial").value = "";
      document.getElementById("newPercentage").value = "";
      document.querySelector("button[onclick='addBomItem()']").textContent = "Add";
      displayBom();
      clearMessage("modal");
    }

    // Remove BOM item
    function removeBomItem(index) {
      if (index >= 0 && index < currentBom.length) {
        currentBom.splice(index, 1);
        editingBomIndex = null;
        editingBomItem = null;
        displayBom();
      }
    }

    // Edit BOM item
    function editBomItem(index) {
      if (index >= 0 && index < currentBom.length) {
        const item = currentBom[index];
        document.getElementById("newMaterial").value = item.material;
        // Convert from decimal (0.8056) to percentage (80.56) for display
        document.getElementById("newPercentage").value = (item.percentage * 100).toFixed(2);
        
        // If this item has a baseField, extract and display the category and index
        if (item.baseField) {
          // Extract category name and index from baseField (e.g., "PE1" -> "PE", "1")
          const match = item.baseField.match(/^([A-Za-z]+)(\d+)$/);
          if (match) {
            document.getElementById("bomCategory").value = match[1];
            document.getElementById("bomCategoryIndex").value = match[2];
          }
        }
        
        // Save reference to original item to preserve field mappings
        editingBomIndex = index;
        editingBomItem = { ...item };
        // Change button text to indicate update mode
        document.querySelector("button[onclick='addBomItem()']").textContent = "Update";
        // Don't remove from array yet - we'll update in place when user clicks Update
      }
    }

    // Close modal
    function closeModal() {
      document.getElementById("editModal").classList.remove("active");
      currentRow = null;
      currentBom = [];
      editingBomIndex = null;
      editingBomItem = null;
      document.querySelector("button[onclick='addBomItem()']").textContent = "Add";
      // Clear BOM input fields
      document.getElementById("bomCategory").value = "";
      document.getElementById("bomCategoryIndex").value = "";
      document.getElementById("newMaterial").value = "";
      document.getElementById("newPercentage").value = "";
    }

    // Save product changes
    async function saveProduct() {
      if (currentRow === null) {
        showMessage("No product selected", "error", "modal");
        return;
      }

      const updates = {
        sapId: document.getElementById("sapId").value,
        pfnId: document.getElementById("pfnId").value,
        customer: document.getElementById("customer").value,
        marketSegment: document.getElementById("marketSegment").value,
        application: document.getElementById("application").value,
        s_sms: document.getElementById("s_sms").value,
        bonding: document.getElementById("bonding").value,
        basisWeight: document.getElementById("basisWeight").value,
        slitWidth: document.getElementById("slitWidth").value,
        treatment: document.getElementById("treatment").value,
        author: document.getElementById("author").value,
        lineId: document.getElementById("lineId").value,
        country: document.getElementById("country").value,
        // Convert gross yield and overconsumption from percentage to decimal for storage
        grossYield: document.getElementById("grossYield").value ? (parseFloat(document.getElementById("grossYield").value) / 100) : "",
        throughput: document.getElementById("throughput").value,
        overconsumption: document.getElementById("overconsumption").value ? (parseFloat(document.getElementById("overconsumption").value) / 100) : "",
        bom: currentBom
      };

      try {
        const response = await fetch("/api/products/update", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ rowIndex: currentRow, updates })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Failed to update product");
        }

        showMessage("Product updated successfully!", "success", "modal");
        setTimeout(() => {
          closeModal();
          loadProducts();
        }, 1000);
      } catch (err) {
        showMessage("Error: " + err.message, "error", "modal");
      }
    }

    // Utility functions
    function showMessage(text, type, target = "main") {
      const msgBox = target === "modal" 
        ? document.getElementById("modalMessage") 
        : document.getElementById("messageBox");
      msgBox.textContent = text;
      msgBox.className = `message ${type}`;
      // Force display with inline style to ensure message is visible
      if (type === "error" || type === "success") {
        msgBox.style.display = "block";
      }
    }

    function clearMessage(target = "main") {
      const msgBox = target === "modal" 
        ? document.getElementById("modalMessage") 
        : document.getElementById("messageBox");
      msgBox.textContent = "";
      msgBox.className = "message";
      msgBox.style.display = "none";
    }

    function showLoading(show) {
      document.getElementById("loadingSpinner").style.display = show ? "block" : "none";
    }

    // Load products on page load
    window.addEventListener("load", loadProducts);

    // Search on Enter key
    document.addEventListener("DOMContentLoaded", () => {
      const searchInput = document.getElementById("searchInput");
      if (searchInput) {
        searchInput.addEventListener("keypress", (e) => {
          if (e.key === "Enter") {
            searchProducts();
          }
        });
      }
    });

    // Auth and logout functions
    function logoutHandler() {
      if (typeof auth !== 'undefined') {
        auth.logout();
      }
    }

    window.addEventListener('load', () => {
      const token = localStorage.getItem('authToken');
      if (!token) {
        window.location.href = '/';
      }
    });
  </script>

  <script src="auth.js"></script>
</body>
</html>
